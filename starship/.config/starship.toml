"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
# scan_timeout = 100

format = """
[оӮ¶](fg:color_bg1)\
$os\
$username\
$hostname\
[оӮҙ ](fg:color_bg1 bg:color_bg2)\
$directory\
[оӮҙ ](fg:color_bg2 bg:color_bg3)\
$git_branch\
$git_status\
[оӮҙ ](fg:color_bg3 bg:color_bg4)\
$c\
$cpp\
$dotnet\
$java\
$kotlin\
$nodejs\
$bun\
$python\
[оӮҙ ](fg:color_bg4 bg:color_bg5)\
$cmd_duration\
[оӮҙ ](fg:color_bg5)\
\n$character\
"""

palette = "ccswe_dark"

[palettes.ccswe_dark]
color_bg1 = "#336699"
color_bg2 = "#2f5783"
color_bg3 = "#294262"
color_bg4 = "#232f44"
color_bg5 = "#1d2230"

color_blue = "#769ff0"
color_gray = "#999999"
color_red = "#eb4d28"
color_white = "#f2f2f2"

[character]
error_symbol = "[вқҜ](bold color_red)"
success_symbol = "[вқҜ](bold color_blue)"

[cmd_duration]
format = "[$duration](bg:color_bg5 fg:color_gray)"
min_time = 500

[directory]
style = "bg:color_bg2 fg:color_white"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:color_bg3 fg:color_blue"
format = "[$symbol $branch]($style)"

[git_status]
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
deleted = "п’Һ"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
format = '[( $all_status$ahead_behind)]($style)'
style = "bold bg:color_bg3 fg:color_red"

[hostname]
format = "[@$hostname]($style)"
ssh_only = true
ssh_symbol = "о¬Ғ "
style = "bg:color_bg1 fg:color_white"

[os]
format = "[$symbol]($style)"
style = "bg:color_bg1 fg:color_white"
disabled = false

[username]
disabled = false
format = "[$user]($style)"
show_always = false
style_root = "bg:color_bg1 fg:color_red"
style_user = "bg:color_bg1 fg:color_white"

# Code symbols
[c]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:#6295CB"
symbol = "оҳһ "

[cpp]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:#6295CB"
symbol = "оҳқ "

[dotnet]
format = '[$symbol($version)]($style)'
style = "bg:color_bg4 fg:#1180C3"
symbol = "у°Ә® "

[java]
format = '[$symbol($version)]($style)'
style = "bg:color_bg4 fg:#F7901E"
symbol = "оү– "

[kotlin]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:#C017E4"
symbol = "оҳҙ "

[nodejs]
style = "bg:color_bg4 fg:#5FA04E"
format = '[$symbol($version)]($style)'
symbol = "оңҳ "

[bun]
style = "bg:color_bg4 fg:#f9e5ce"
format = '[$symbol($version)]($style)'
symbol = "оқҜ "

[python]
style = "bg:color_bg4 fg:#ffd241"
format = '[$symbol($version)]($style)'
symbol = "оҳҶ "

