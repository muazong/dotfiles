#############
### DEVICE ###
#############

input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  follow_mouse = 1
  sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.
  accel_profile = adaptive
  touchpad {
      natural_scroll = true
      scroll_factor = 0.6
  }
}

gestures {
   workspace_swipe_forever = false
   gesture = 3, horizontal, workspace
}

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}
